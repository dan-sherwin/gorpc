name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.26.3']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: false

      - name: Go env
        run: go env

      - name: Tidy (check)
        run: |
          go mod tidy
          if [ -f go.sum ]; then
            git diff --exit-code -- go.mod go.sum
          else
            git diff --exit-code -- go.mod
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (race)
        run: go test ./... -race -count=1

      - name: GolangCI-Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout 5m
          skip-cache: true

      - name: Govulncheck
        uses: golang/govulncheck-action@v1
